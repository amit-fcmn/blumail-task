<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback Insights</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Feedback Insights</h1>
        <p class="subtitle">Submit feedback and view AI-generated insights.</p>
      </header>

      <div id="alert" class="alert hidden" role="alert"></div>

      <section class="card">
        <h2>Submit feedback</h2>
        <form id="submit-form">
          <label for="content">Your feedback</label>
          <textarea
            id="content"
            name="content"
            rows="5"
            maxlength="16384"
            required
            placeholder="Share what you think..."
          ></textarea>
          <p class="hint"><span id="char-count">0</span> / 16384 characters</p>
          <button type="submit" id="submit-btn">Submit</button>
        </form>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>Feedback list</h2>
          <div class="filters">
            <label for="status-filter">Status</label>
            <select id="status-filter">
              <option value="">All</option>
              <option value="RECEIVED">RECEIVED</option>
              <option value="ANALYZING">ANALYZING</option>
              <option value="DONE">DONE</option>
              <option value="FAILED">FAILED</option>
            </select>
            <button type="button" id="refresh-btn">Refresh</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Preview</th>
                <th>Status</th>
                <th>Updated</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="feedback-tbody"></tbody>
          </table>
        </div>
        <div class="pagination">
          <button type="button" id="prev-page" disabled>Previous</button>
          <span id="page-info">Page 1</span>
          <button type="button" id="next-page" disabled>Next</button>
        </div>
      </section>

      <section id="detail-section" class="card hidden">
        <div class="detail-header">
          <h2>Feedback detail</h2>
          <button type="button" id="close-detail">Close</button>
        </div>
        <div id="detail-content"></div>
        <button type="button" id="retry-btn" class="hidden">Retry analysis</button>
      </section>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
